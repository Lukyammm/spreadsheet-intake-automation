<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --color-bg: #f3f7f8;
    --color-bg-soft: #eef4f5;
    --color-surface: rgba(255, 255, 255, 0.82);
    --color-surface-strong: rgba(255, 255, 255, 0.94);
    --color-border: rgba(15, 23, 42, 0.12);

    --color-primary: #0f766e;
    --color-primary-soft: #d4efec;
    --color-primary-alt: #15988d;
    --color-success: #1f8f5f;
    --color-success-soft: #d8f4e4;
    --color-warning: #b7791f;
    --color-warning-soft: #f8ebd6;
    --color-error: #c05621;
    --color-error-soft: #f9e2d7;
    --color-info: #1d4ed8;
    --color-info-soft: #dbeafe;

    --color-text: #15212b;
    --color-muted: #5f6d79;
    --color-heading: #0f172a;

    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 24px;
    --space-6: 32px;

    --radius-sm: 12px;
    --radius-md: 16px;
    --radius-lg: 20px;
    --radius-xl: 24px;
    --radius-pill: 999px;

    --shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.08);
    --shadow-focus: 0 0 0 3px rgba(15, 118, 110, 0.25);
    --shadow-primary-md: 0 10px 20px rgba(15, 118, 110, 0.3);
    --shadow-primary-sm: 0 10px 18px rgba(15, 118, 110, 0.28);

    --transition-fast: 0.2s ease;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--color-text);
    background: linear-gradient(160deg, var(--color-bg) 0%, var(--color-bg-soft) 100%);
  }

  .app-shell {
    position: relative;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    z-index: 0;
  }

  .bg-orb-a {
    width: 280px;
    height: 280px;
    top: -80px;
    left: -60px;
    background: var(--color-primary-soft);
  }

  .bg-orb-b {
    width: 320px;
    height: 320px;
    right: -120px;
    bottom: 120px;
    background: var(--color-warning-soft);
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1280px;
    margin: 0 auto;
    padding: var(--space-6) var(--space-5);
    display: grid;
    gap: var(--space-5);
  }

  .card {
    background: var(--color-surface);
    backdrop-filter: blur(10px);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-soft);
    padding: var(--space-5);
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: var(--space-4);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: var(--space-4);
  }

  .logo {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-md);
    background: linear-gradient(140deg, var(--color-primary) 0%, var(--color-primary-alt) 100%);
    color: var(--color-surface-strong);
    display: grid;
    place-items: center;
    font-weight: 700;
    font-size: 18px;
    box-shadow: var(--shadow-primary-md);
  }

  .title {
    margin: 0;
    font-size: 30px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--color-heading);
  }

  .subtitle {
    margin: var(--space-1) 0 0;
    font-size: 14px;
    color: var(--color-muted);
  }

  .statusPill {
    padding: var(--space-2) var(--space-4);
    border-radius: var(--radius-pill);
    font-size: 13px;
    font-weight: 600;
    color: var(--color-primary);
    background: var(--color-primary-soft);
    transition: transform var(--transition-fast), box-shadow var(--transition-fast);
  }

  .statusPill:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-soft);
  }

  .layout-grid {
    display: grid;
    grid-template-columns: repeat(12, minmax(0, 1fr));
    gap: var(--space-5);
  }

  .metrics-section { grid-column: span 12; }
  .drop { grid-column: span 5; }
  .config-panel { grid-column: span 7; }
  .wide { grid-column: span 12; }

  .section-header {
    display: flex;
    justify-content: space-between;
    gap: var(--space-4);
    align-items: flex-start;
    margin-bottom: var(--space-4);
  }

  .eyebrow {
    margin: 0;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color-muted);
  }

  .section-title {
    margin: var(--space-1) 0 0;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.015em;
    color: var(--color-heading);
  }

  .section-title-sm { font-size: 20px; }

  .section-sub {
    margin: var(--space-2) 0 0;
    font-size: 14px;
    color: var(--color-muted);
  }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: var(--space-3);
  }

  .metric-card {
    border-radius: var(--radius-lg);
    padding: var(--space-4);
    border-left: 4px solid var(--color-primary);
    background: var(--color-surface-strong);
    transition: transform var(--transition-fast), box-shadow var(--transition-fast);
  }

  .metric-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-soft);
  }

  .metric-label {
    margin: 0;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.08em;
    font-weight: 600;
    color: var(--color-muted);
  }

  .metric-value {
    margin: var(--space-2) 0 0;
    font-size: 30px;
    letter-spacing: -0.02em;
    font-weight: 600;
    color: var(--color-heading);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .metric-primary { border-left-color: var(--color-primary); background: var(--color-primary-soft); }
  .metric-success { border-left-color: var(--color-success); background: var(--color-success-soft); }
  .metric-warning { border-left-color: var(--color-warning); background: var(--color-warning-soft); }
  .metric-neutral { border-left-color: var(--color-muted); background: var(--color-surface-strong); }

  .chart-wrap {
    margin-top: var(--space-5);
    border-radius: var(--radius-lg);
    border: 1px solid var(--color-border);
    background: var(--color-surface-strong);
    padding: var(--space-4);
    min-height: 220px;
  }

  .drop {
    min-height: 320px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px dashed var(--color-border);
    transition: border-color var(--transition-fast), background var(--transition-fast);
  }

  .drop.is-drag {
    border-color: var(--color-primary);
    background: var(--color-primary-soft);
  }

  .dropInner { max-width: 460px; text-align: center; }
  .dropIcon { font-size: 42px; color: var(--color-primary); }
  .dropTitle { margin: var(--space-2) 0 0; font-size: 26px; font-weight: 600; letter-spacing: -0.02em; }
  .dropHint { margin: var(--space-2) 0 0; font-size: 14px; color: var(--color-muted); }

  .row {
    margin-top: var(--space-5);
    display: flex;
    gap: var(--space-3);
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    min-height: 44px;
    border-radius: var(--radius-md);
    padding: var(--space-2) var(--space-4);
    border: 1px solid transparent;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition-fast);
  }

  .btn:focus-visible,
  .input:focus-visible,
  .check-chip input:focus-visible + span {
    outline: none;
    box-shadow: var(--shadow-focus);
  }

  .btn:active { transform: translateY(1px); }

  .btn-primary {
    color: var(--color-surface-strong);
    background: linear-gradient(140deg, var(--color-primary) 0%, var(--color-primary-alt) 100%);
    box-shadow: var(--shadow-primary-sm);
  }

  .btn-primary:hover { filter: brightness(1.04); }

  .btn-secondary {
    color: var(--color-text);
    background: var(--color-surface-strong);
    border-color: var(--color-border);
  }

  .btn-secondary:hover { background: var(--color-bg-soft); }

  .btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .badge {
    border-radius: var(--radius-pill);
    padding: var(--space-2) var(--space-3);
    background: var(--color-primary-soft);
    color: var(--color-primary);
    font-size: 12px;
    font-weight: 600;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-4);
  }

  .label {
    display: block;
    margin-bottom: var(--space-2);
    color: var(--color-muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }

  .input {
    width: 100%;
    min-height: 44px;
    border-radius: var(--radius-md);
    border: 1px solid var(--color-border);
    padding: var(--space-2) var(--space-3);
    font-size: 14px;
    color: var(--color-text);
    background: var(--color-surface-strong);
    transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
  }

  .input:hover { border-color: var(--color-primary); }

  .divider {
    margin: var(--space-5) 0;
    height: 1px;
    background: var(--color-border);
  }

  .filter-chips {
    margin-top: var(--space-3);
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
  }

  .check-chip {
    display: inline-flex;
    align-items: center;
  }

  .check-chip input { position: absolute; opacity: 0; pointer-events: none; }

  .check-chip span {
    border-radius: var(--radius-pill);
    border: 1px solid var(--color-border);
    padding: var(--space-2) var(--space-3);
    font-size: 12px;
    font-weight: 600;
    color: var(--color-muted);
    background: var(--color-surface-strong);
    transition: all var(--transition-fast);
    user-select: none;
  }

  .check-chip input:checked + span {
    color: var(--color-primary);
    border-color: var(--color-primary);
    background: var(--color-primary-soft);
  }


  .panel-stack {
    display: grid;
    gap: var(--space-4);
  }

  .panel-block {
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    background: var(--color-surface-strong);
    padding: var(--space-4);
  }

  .panel-collapsible summary {
    list-style: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    gap: var(--space-3);
  }

  .panel-collapsible summary::-webkit-details-marker { display: none; }

  .summary-helper {
    font-size: 12px;
    font-weight: 600;
    color: var(--color-primary);
    background: var(--color-primary-soft);
    border-radius: var(--radius-pill);
    padding: 6px 10px;
    white-space: nowrap;
  }

  .panel-collapsible[open] .summary-helper {
    color: var(--color-muted);
    background: var(--color-bg-soft);
  }

  .panel-content {
    margin-top: var(--space-4);
  }

  .row-left {
    justify-content: flex-start;
  }

  .flow-step {
    transition: opacity var(--transition-fast), box-shadow var(--transition-fast), border-color var(--transition-fast);
  }

  .flow-step-active {
    opacity: 1;
    border-color: rgba(15, 118, 110, 0.38);
    box-shadow: 0 8px 20px rgba(15, 118, 110, 0.1);
  }

  .flow-step-muted {
    opacity: 0.7;
  }

  .cta-sub { margin: 8px 0 0; }

  .panel-sticky-action {
    position: sticky;
    bottom: var(--space-3);
    box-shadow: var(--shadow-soft);
  }

  .actions-grid {
    display: flex;
    justify-content: space-between;
    gap: var(--space-3);
    align-items: center;
    flex-wrap: wrap;
  }

  .check {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    font-size: 13px;
    color: var(--color-muted);
  }

  .micro { margin-top: var(--space-3); font-size: 12px; color: var(--color-muted); }
  .micro[role="alert"] { color: var(--color-error); font-weight: 600; }

  .field-error { margin-top: 6px; font-size: 12px; color: var(--color-error); }
  .input.is-invalid { border-color: var(--color-error); background: var(--color-error-soft); }

  .table-empty {
    padding: var(--space-4);
    text-align: center;
    color: var(--color-muted);
    background: var(--color-surface-strong);
  }

  .tableWrap {
    overflow: auto;
    border-radius: var(--radius-lg);
    border: 1px solid var(--color-border);
    background: var(--color-surface-strong);
  }

  .table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .table th,
  .table td {
    padding: var(--space-3) var(--space-4);
    border-bottom: 1px solid var(--color-border);
    text-align: left;
  }

  .table th {
    background: var(--color-bg-soft);
    color: var(--color-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 11px;
    font-weight: 600;
    position: sticky;
    top: 0;
    z-index: 2;
  }

  .table tbody tr:hover { background: var(--color-bg-soft); }

  .progressWrap { margin-top: var(--space-4); }
  .progressWrap.is-hidden { display: none; }

  .progressBar {
    height: 10px;
    border-radius: var(--radius-pill);
    background: var(--color-bg-soft);
    overflow: hidden;
  }

  .progressFill {
    height: 100%;
    width: 0%;
    background: linear-gradient(140deg, var(--color-primary) 0%, var(--color-primary-alt) 100%);
    transition: width var(--transition-fast);
  }

  .progressMeta {
    margin-top: var(--space-2);
    font-size: 12px;
    color: var(--color-muted);
  }

  .footer {
    padding: var(--space-4) var(--space-5);
    font-size: 12px;
    color: var(--color-muted);
  }

  .muted { color: var(--color-muted); }

  @media (max-width: 1080px) {
    .metrics-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .drop,
    .config-panel { grid-column: span 12; }
  }

  @media (max-width: 760px) {
    .app { padding: var(--space-5) var(--space-4); gap: var(--space-4); }
    .topbar { flex-direction: column; align-items: flex-start; }
    .metrics-grid,
    .form-grid { grid-template-columns: 1fr; }
    .section-title { font-size: 22px; }
    .dropTitle { font-size: 22px; }
    .card { padding: var(--space-4); }
  }
</style>
