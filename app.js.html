<script>
  const el = (id) => document.getElementById(id);
  const isChecked = (id, fallback = false) => {
    const node = el(id);
    return node ? !!node.checked : fallback;
  };

  const state = {
    boot: null,
    lastIngest: null,
    rawValues: null,
    values: null,
    chart: null,
    editingRuleKey: "",
  };

  function setStatus(txt){ el("statusPill").textContent = txt; }
  function setInlineNote(id, message, isError = false){
    const node = el(id);
    if (!node) return;
    node.textContent = message;
    if (isError) node.setAttribute("role", "alert");
    else node.removeAttribute("role");
  }

  function showProgress(show, pct = 0, label = ""){
    const progress = el("progressWrap");
    progress.classList.toggle("is-hidden", !show);
    el("progressFill").style.width = `${pct}%`;
    el("progressMeta").textContent = label || "Processando…";
  }

  function fakeProgress(sequence){
    let i = 0;
    let pct = 0;
    showProgress(true, 0, sequence[0] || "Iniciando…");
    const t = setInterval(() => {
      pct = Math.min(92, pct + Math.random() * 12);
      const label = sequence[Math.min(sequence.length - 1, Math.floor(i / 2))] || "Processando…";
      showProgress(true, pct, label);
      i++;
    }, 220);
    return () => {
      clearInterval(t);
      showProgress(true, 100, "Finalizando…");
    };
  }

  function readFileAsBase64(file){
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onerror = () => reject(new Error("Falha ao ler arquivo."));
      r.onload = () => {
        const res = String(r.result || "");
        const base64 = res.split(",")[1] || "";
        resolve(base64);
      };
      r.readAsDataURL(file);
    });
  }

  function readExcelAsValues(file){
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onerror = () => reject(new Error("Falha ao ler arquivo Excel."));
      r.onload = () => {
        try {
          const data = new Uint8Array(r.result);
          const wb = XLSX.read(data, { type: "array" });
          const sheetName = wb.SheetNames[0];
          const ws = wb.Sheets[sheetName];
          const values = XLSX.utils.sheet_to_json(ws, { header: 1, raw: true });
          resolve(values);
        } catch (err) {
          reject(new Error("Falha ao interpretar Excel."));
        }
      };
      r.readAsArrayBuffer(file);
    });
  }

  function renderPreview(preview){
    const table = el("previewTable");
    table.innerHTML = "";
    if (!preview || !preview.header) {
      table.innerHTML = '<tbody><tr><td class="table-empty">Prévia indisponível. Envie um arquivo para visualizar os dados.</td></tr></tbody>';
      return;
    }

    const thead = document.createElement("thead");
    const trh = document.createElement("tr");
    preview.header.forEach((h) => {
      const th = document.createElement("th");
      th.textContent = h;
      trh.appendChild(th);
    });
    thead.appendChild(trh);
    table.appendChild(thead);

    const tbody = document.createElement("tbody");
    (preview.rows || []).forEach((row) => {
      const tr = document.createElement("tr");
      row.forEach((cell) => {
        const td = document.createElement("td");
        td.textContent = (cell === null || cell === undefined) ? "" : String(cell);
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
  }

  function normalizeColumnLetter(value){
    const clean = String(value || "").toUpperCase().replace(/[^A-Z]/g, "");
    return clean || "A";
  }

  function setLayoutInputsEnabled(enabled){
    el("headerRowNumber").disabled = !enabled;
    el("startColumnLetter").disabled = !enabled;
  }

  

  function updateStructureVisibility(){
    const details = el("structureDetails");
    if (!details) return;
    details.style.display = (el("hasHeader")?.value || "yes") === "yes" ? "block" : "none";
  }

  function setFlowStep(step){
    [["flowStep1", 1], ["flowStep2", 2], ["flowStep4", 3]].forEach(([id, idx]) => {
      const node = el(id);
      if (!node) return;
      const active = step === idx;
      node.classList.toggle("flow-step-active", active);
      node.classList.toggle("flow-step-muted", !active);
    });
  }

  function applyLayoutSuggestion(layout){
    if (!layout) return;
    el("headerRowNumber").value = String(layout.headerRowNumber || 1);
    el("startColumnLetter").value = normalizeColumnLetter(layout.startColumnLetter || "A");
    const confidence = Number(layout.confidence || 0);
    el("layoutNote").textContent = `Detectado automaticamente: cabeçalho na linha ${layout.headerRowNumber || 1}, coluna ${normalizeColumnLetter(layout.startColumnLetter || "A")} (confiança ${confidence}%).`;
  }

  function renderMetrics(res){
    const metricFile = el("metricFile");
    const metricRows = el("metricRows");
    const metricCols = el("metricCols");
    const metricScore = el("metricScore");
    if (!metricFile || !metricRows || !metricCols || !metricScore) return;

    const fullValues = res?.preview?.fullValues || [];
    const fileName = res?.file?.name || "—";
    const rows = Math.max(0, fullValues.length - 1);
    const cols = fullValues[0]?.length || 0;
    const score = res?.suggestion?.score || 0;

    metricFile.textContent = fileName;
    metricRows.textContent = String(rows);
    metricCols.textContent = String(cols);
    metricScore.textContent = String(score);
  }

  function renderChart(preview){
    const canvas = el("previewChart");
    if (!canvas) {
      if (state.chart) state.chart.destroy();
      state.chart = null;
      return;
    }

    const rows = preview?.rows || [];
    const labels = rows.map((_, idx) => `Linha ${idx + 1}`);
    const sizes = rows.map((r) => r.filter((c) => String(c ?? "").trim() !== "").length);

    if (state.chart) state.chart.destroy();

    const css = getComputedStyle(document.documentElement);
    const colorPrimary = css.getPropertyValue("--color-primary").trim();
    const colorPrimarySoft = css.getPropertyValue("--color-primary-soft").trim();
    const colorMuted = css.getPropertyValue("--color-muted").trim();

    state.chart = new Chart(canvas, {
      type: "line",
      data: {
        labels: labels.length ? labels : ["Sem dados"],
        datasets: [{
          label: "Células preenchidas",
          data: sizes.length ? sizes : [0],
          borderColor: colorPrimary,
          backgroundColor: colorPrimarySoft,
          tension: 0.35,
          fill: true,
          pointRadius: 3,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: colorPrimarySoft }, ticks: { color: colorMuted } },
          y: { beginAtZero: true, grid: { color: colorPrimarySoft }, ticks: { color: colorMuted } },
        },
      },
    });
  }

  function setSheetOptions(sheets){
    const select = el("sheetName");
    select.innerHTML = "";
    if (!sheets.length){
      const opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "Nenhuma aba encontrada";
      select.appendChild(opt);
      select.disabled = true;
      return;
    }

    sheets.forEach((name) => {
      const opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name;
      select.appendChild(opt);
    });
    select.disabled = false;
  }

  function setDestinationOptions(destinations){
    const select = el("spreadsheetId");
    select.innerHTML = "";

    (destinations || []).forEach((d) => {
      const opt = document.createElement("option");
      opt.value = d.spreadsheetId;
      opt.textContent = `${d.name} (${d.spreadsheetName || d.spreadsheetId})`;
      select.appendChild(opt);
    });

    select.disabled = !select.options.length;
    renderDestinationsTable(destinations || []);
  }

  function renderDestinationsTable(destinations){
    const table = el("destinationTable");
    if (!table) return;
    table.innerHTML = "";

    const thead = document.createElement("thead");
    thead.innerHTML = "<tr><th>Nome</th><th>Planilha</th><th>Ações</th></tr>";
    table.appendChild(thead);

    const tbody = document.createElement("tbody");
    (destinations || []).forEach((d) => {
      const tr = document.createElement("tr");
      const tdName = document.createElement("td");
      tdName.textContent = d.name || "—";
      const tdSheet = document.createElement("td");
      tdSheet.textContent = d.spreadsheetName || d.spreadsheetId || "—";
      const tdActions = document.createElement("td");

      const useBtn = document.createElement("button");
      useBtn.className = "btn btn-secondary";
      useBtn.textContent = "Selecionar";
      useBtn.onclick = async () => {
        el("spreadsheetId").value = d.spreadsheetId;
        await loadSheetsForSelectedSpreadsheet();
        applyTargetPrefsForCurrentSelection();
        el("destinationNote").textContent = `Destino selecionado: ${d.name}`;
      };

      const delBtn = document.createElement("button");
      delBtn.className = "btn btn-secondary";
      delBtn.textContent = "Excluir";
      delBtn.style.marginLeft = "8px";
      delBtn.onclick = async () => {
        if (!confirm(`Confirma remover a planilha "${d.name}" do cadastro?`)) return;
        try {
          const res = await new Promise((resolve, reject) => {
            google.script.run
              .withSuccessHandler(resolve)
              .withFailureHandler((err) => reject(new Error(err?.message || err)))
              .api_deleteDestination({ spreadsheetId: d.spreadsheetId });
          });
          state.boot.destinations = res.destinations || [];
          state.boot.rules = res.rules || [];
          setDestinationOptions(res.destinations || []);
          renderRulesTable(state.boot.rules);
          if (el("spreadsheetId").value) {
            await loadSheetsForSelectedSpreadsheet();
          } else {
            setSheetOptions([]);
          }
          el("destinationNote").textContent = "Planilha removida do cadastro.";
        } catch (err) {
          el("destinationNote").textContent = `Erro ao remover planilha: ${err.message}`;
        }
      };

      tdActions.appendChild(useBtn);
      tdActions.appendChild(delBtn);
      tr.appendChild(tdName);
      tr.appendChild(tdSheet);
      tr.appendChild(tdActions);
      tbody.appendChild(tr);
    });
    if (!destinations?.length) {
      const tr = document.createElement("tr");
      tr.innerHTML = '<td colspan="3" class="table-empty">Nenhuma planilha cadastrada. Cadastre uma planilha para continuar.</td>';
      tbody.appendChild(tr);
    }

    table.appendChild(tbody);
  }

  function renderRulesTable(rules){
    const table = el("rulesTable");
    if (!table) return;
    table.innerHTML = "";

    const thead = document.createElement("thead");
    thead.innerHTML = "<tr><th>Chave</th><th>Palavras-chave</th><th>Destino</th><th>Aba</th><th>Modo</th><th>Ações</th></tr>";
    table.appendChild(thead);

    const destinationMap = {};
    (state.boot?.destinations || []).forEach((d) => {
      destinationMap[d.spreadsheetId] = d.name || d.spreadsheetName || d.spreadsheetId;
    });

    const tbody = document.createElement("tbody");
    (rules || []).forEach((r) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${r.key || "—"}</td>
        <td>${(r.keywords || []).join(";")}</td>
        <td>${destinationMap[r.targetSpreadsheetId] || r.targetSpreadsheetId || "—"}</td>
        <td>${r.targetSheet || "—"}</td>
        <td>${r.mode || "APPEND"}</td>
        <td></td>
      `;
      const actionsCell = tr.lastElementChild;

      const editBtn = document.createElement("button");
      editBtn.className = "btn btn-secondary";
      editBtn.textContent = "Editar";
      editBtn.onclick = () => {
        state.editingRuleKey = r.key || "";
        el("ruleKey").value = r.key || "";
        el("ruleKeywords").value = (r.keywords || []).join(";");
        el("spreadsheetId").value = r.targetSpreadsheetId || "";
        loadSheetsForSelectedSpreadsheet().then(() => {
          el("sheetName").value = r.targetSheet || "";
          el("mode").value = r.mode || "APPEND";
          el("rulesNote").textContent = `Editando regra: ${r.key}`;
        });
      };

      const delBtn = document.createElement("button");
      delBtn.className = "btn btn-secondary";
      delBtn.textContent = "Excluir";
      delBtn.style.marginLeft = "8px";
      delBtn.onclick = async () => {
        if (!confirm(`Confirma remover a regra "${r.key}"?`)) return;
        try {
          const res = await new Promise((resolve, reject) => {
            google.script.run
              .withSuccessHandler(resolve)
              .withFailureHandler((err) => reject(new Error(err?.message || err)))
              .api_deleteRule({ key: r.key });
          });
          state.boot.rules = res.rules || [];
          renderRulesTable(state.boot.rules);
          el("rulesNote").textContent = "Regra removida com sucesso.";
        } catch (err) {
          el("rulesNote").textContent = `Erro ao remover regra: ${err.message}`;
        }
      };

      actionsCell.appendChild(editBtn);
      actionsCell.appendChild(delBtn);
      tbody.appendChild(tr);
    });
    if (!rules?.length) {
      const tr = document.createElement("tr");
      tr.innerHTML = '<td colspan="6" class="table-empty">Nenhuma regra cadastrada. Cadastre uma regra para sugerir destino automaticamente.</td>';
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
  }

  function currentDestinationName(){
    const select = el("spreadsheetId");
    const option = select.options[select.selectedIndex];
    return option ? option.textContent : "";
  }

  function selectSheetName(name){
    const select = el("sheetName");
    if (!select.options.length) return;
    const found = Array.from(select.options).some((opt) => opt.value === name);
    select.value = found ? name : select.options[0].value;
  }

  async function applySuggestion(sug){
    if (!sug || !sug.route) return;
    el("matchBadge").textContent = `Match: ${sug.match} • score ${sug.score}`;
    if (sug.route.targetSpreadsheetId) {
      el("spreadsheetId").value = sug.route.targetSpreadsheetId;
      await loadSheetsForSelectedSpreadsheet();
    }
    selectSheetName(sug.route.targetSheetName || "");
    el("mode").value = sug.route.mode || "APPEND";
  }

  function applyPrefs(prefs){
    if (!prefs) return;
    const std = prefs.lastStandardize || null;
    const route = prefs.lastRoute || null;
    const layout = prefs.lastLayout || null;

    if (std){
      el("trimCells").checked = !!std.trimCells;
      el("removeEmptyRows").checked = !!std.removeEmptyRows;
      el("removeEmptyCols").checked = !!std.removeEmptyCols;
      el("normalizeHeaders").checked = !!std.normalizeHeaders;
      if (el("dedupeHeaders")) el("dedupeHeaders").checked = !!std.dedupeHeaders;
      if (el("numberCoerce")) el("numberCoerce").checked = !!std.numberCoerce;
      if (el("dateCoerce")) el("dateCoerce").checked = !!std.dateCoerce;
      el("microNote").textContent = "Preferências carregadas (padronização).";
    }
    if (route){
      if (route.targetSpreadsheetId) {
        el("spreadsheetId").value = route.targetSpreadsheetId;
      }
      selectSheetName(route.targetSheetName || "");
      el("mode").value = route.mode || "APPEND";
      el("microNote").textContent = "Preferências carregadas (rota + padronização).";
    }
    if (layout) {
      el("headerRowNumber").value = String(layout.headerRowNumber || 1);
      el("startColumnLetter").value = normalizeColumnLetter(layout.startColumnLetter || "A");
    }
  }

  function applyTargetPrefsForCurrentSelection(){
    const prefs = state.boot?.prefs || {};
    const map = prefs.targetPrefs || {};
    const key = `${el("spreadsheetId").value}::${el("sheetName").value}`;
    const hit = map[key];
    if (!hit) return;

    if (hit.mode) el("mode").value = hit.mode;
    if (hit.standardize) {
      el("trimCells").checked = !!hit.standardize.trimCells;
      el("removeEmptyRows").checked = !!hit.standardize.removeEmptyRows;
      el("removeEmptyCols").checked = !!hit.standardize.removeEmptyCols;
      el("normalizeHeaders").checked = !!hit.standardize.normalizeHeaders;
      if (el("dedupeHeaders")) el("dedupeHeaders").checked = !!hit.standardize.dedupeHeaders;
      if (el("numberCoerce")) el("numberCoerce").checked = !!hit.standardize.numberCoerce;
      if (el("dateCoerce")) el("dateCoerce").checked = !!hit.standardize.dateCoerce;
    }
    if (hit.layout) {
      el("headerRowNumber").value = String(hit.layout.headerRowNumber || 1);
      el("startColumnLetter").value = normalizeColumnLetter(hit.layout.startColumnLetter || "A");
    }
    el("layoutNote").textContent = "Padrão salvo carregado para esta aba.";
  }

  function isExcelFile(file){
    const name = String(file?.name || "").trim().toLowerCase();
    const mime = String(file?.type || "").toLowerCase();
    return (
      name.endsWith(".xls") ||
      name.endsWith(".xlsx") ||
      (mime && (mime.includes("excel") || mime.includes("spreadsheet")))
    );
  }

  async function ingest(file){
    setStatus("Lendo arquivo…");
    const stopFake = fakeProgress([
      "Lendo bytes…",
      "Analisando cabeçalho…",
      "Tentando identificar base…",
      "Preparando preview…"
    ]);

    const isExcel = isExcelFile(file);
    const payload = {
      name: file.name,
      mime: file.type,
      size: file.size,
    };

    if (isExcel) {
      payload.values = await readExcelAsValues(file);
      payload.sourceType = file.name.toLowerCase().endsWith(".xls") ? "XLS" : "XLSX";
    } else {
      payload.base64 = await readFileAsBase64(file);
    }

    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler((res) => {
          stopFake();
          showProgress(true, 100, "Pronto.");
          resolve(res);
        })
        .withFailureHandler((err) => {
          stopFake();
          showProgress(false);
          reject(new Error(err?.message || err));
        })
        .api_ingestFile(payload);
    });
  }

  function collectStandardize(){
    return {
      trimCells: el("trimCells").checked,
      removeEmptyRows: el("removeEmptyRows").checked,
      removeEmptyCols: el("removeEmptyCols").checked,
      normalizeHeaders: el("normalizeHeaders").checked,
      dedupeHeaders: isChecked("dedupeHeaders"),
      numberCoerce: isChecked("numberCoerce"),
      dateCoerce: isChecked("dateCoerce"),
    };
  }

  function collectLayout(){
    return {
      headerRowNumber: Math.max(1, Number(el("headerRowNumber").value || 1)),
      startColumnLetter: normalizeColumnLetter(el("startColumnLetter").value || "A"),
    };
  }

  function collectRoute(){
    return {
      targetSpreadsheetId: el("spreadsheetId").value,
      targetSheetName: el("sheetName").value || "BASE",
      mode: el("mode").value,
      createIfMissing: false,
    };
  }

  async function loadSheetsForSelectedSpreadsheet(){
    const spreadsheetId = el("spreadsheetId").value;
    if (!spreadsheetId) return;
    const res = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler((err) => reject(new Error(err?.message || err)))
        .api_listSheets(spreadsheetId);
    });
    setSheetOptions(res.sheets || []);
  }

  async function commit(){
    if (!state.values) return;
    el("importBtn").disabled = true;
    setStatus("Importando…");
    const stopFake = fakeProgress([
      "Padronizando…",
      "Gravando na base…",
      "Quase lá…"
    ]);

    const req = {
      fileName: state.lastIngest?.file?.name || "import",
      values: state.rawValues || state.values,
      route: collectRoute(),
      layout: collectLayout(),
      standardize: collectStandardize(),
      remember: {
        dontAskAgain: el("dontAskAgain").checked,
        rememberKey: (state.lastIngest?.suggestion?.match || "default"),
      }
    };

    const res = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler((err) => reject(new Error(err?.message || err)))
        .api_commitImport(req);
    });

    stopFake();
    showProgress(true, 100, `Importado: ${res.wrote.rows}x${res.wrote.cols}`);
    setStatus("Pronto");
    el("microNote").textContent = `Escreveu em ${res.target.sheetName} • ${res.tookMs}ms`;
  }

  function wireDropzone(){
    const dz = el("dropzone");
    const fileInput = el("fileInput");

    el("pickBtn").onclick = () => fileInput.click();
    fileInput.onchange = async (e) => {
      const f = e.target.files?.[0];
      if (f) await handleFile(f);
      fileInput.value = "";
    };

    dz.addEventListener("dragover", (e) => {
      e.preventDefault();
      dz.classList.add("is-drag");
    });

    dz.addEventListener("dragleave", () => {
      dz.classList.remove("is-drag");
    });

    dz.addEventListener("drop", async (e) => {
      e.preventDefault();
      dz.classList.remove("is-drag");
      const f = e.dataTransfer.files?.[0];
      if (f) await handleFile(f);
    });

    el("demoBtn").onclick = async () => {
      const csv = "nome;data;valor\nJoao;22/12/2025;1.234,50\nMaria;21/12/2025;99,90\n";
      const blob = new Blob([csv], { type: "text/csv" });
      const f = new File([blob], "Internacao_demo.csv", { type: "text/csv" });
      await handleFile(f);
    };
  }

  async function handleFile(file){
    try {
      el("importBtn").disabled = true;
      el("copyJsonBtn").disabled = true;
      setStatus("Processando upload…");
      setFlowStep(2);

      const res = await ingest(file);
      state.lastIngest = res;
      state.rawValues = res.rawValues || [];

      if (res.preview?.fullValues) {
        state.values = res.preview.fullValues;
      } else if (res.preview?.rows) {
        state.values = [res.preview.header].concat(res.preview.rows);
      }

      await applySuggestion(res.suggestion);
      if (el("autoLayout").checked) {
        applyLayoutSuggestion(res.layoutSuggestion);
      }
      renderPreview(res.preview);
      renderMetrics(res);
      renderChart(res.preview);
      setStatus("Pronto para importar");
      setFlowStep(3);
      el("importBtn").disabled = false;
      el("copyJsonBtn").disabled = false;
      el("microNote").textContent = `Detectado: ${res.suggestion?.match || "—"} • origem: ${res.meta?.sourceType}`;

    } catch (err) {
      setStatus("Erro");
      showProgress(false);
      el("microNote").textContent = `Erro: ${err.message}`;
      console.error(err);
    }
  }

  function wireActions(){
    el("importBtn").onclick = () => commit();
    el("spreadsheetId").onchange = async () => {
      try {
        await loadSheetsForSelectedSpreadsheet();
        applyTargetPrefsForCurrentSelection();
        setInlineNote("destinationNote", `Destino selecionado: ${currentDestinationName()}`);
      } catch (err) {
        setInlineNote("destinationNote", `Erro ao carregar abas: ${err.message}`, true);
      }
    };
    el("sheetName").onchange = () => {
      applyTargetPrefsForCurrentSelection();
    };
    el("hasHeader").onchange = () => updateStructureVisibility();
    el("autoLayout").onchange = () => {
      const manualEnabled = !el("autoLayout").checked;
      setLayoutInputsEnabled(manualEnabled);
      if (!manualEnabled && state.lastIngest?.layoutSuggestion) {
        applyLayoutSuggestion(state.lastIngest.layoutSuggestion);
      }
    };

    el("saveDestinationBtn").onclick = async () => {
      try {
        const name = el("newDestinationName").value.trim();
        const spreadsheet = el("newDestinationUrl").value.trim();
        const res = await new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler((err) => reject(new Error(err?.message || err)))
            .api_saveDestination({ name, spreadsheet });
        });
        state.boot.destinations = res.destinations || [];
        setDestinationOptions(res.destinations || []);
        const created = (res.destinations || []).find((d) => d.name === name);
        if (created?.spreadsheetId) {
          el("spreadsheetId").value = created.spreadsheetId;
        }
        await loadSheetsForSelectedSpreadsheet();
        setInlineNote("destinationNote", "Planilha cadastrada com sucesso.");
        el("newDestinationName").value = "";
        el("newDestinationUrl").value = "";
      } catch (err) {
        setInlineNote("destinationNote", `Erro ao salvar planilha: ${err.message}`, true);
      }
    };

    el("saveRuleBtn").onclick = async () => {
      try {
        const payload = {
          key: el("ruleKey").value.trim(),
          keywords: el("ruleKeywords").value.trim(),
          targetSpreadsheetId: el("spreadsheetId").value,
          targetSheet: el("sheetName").value,
          mode: el("mode").value,
        };
        const res = await new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler((err) => reject(new Error(err?.message || err)))
            .api_saveRule(payload);
        });
        state.editingRuleKey = "";
        state.boot.rules = res.rules || [];
        renderRulesTable(state.boot.rules);
        setInlineNote("rulesNote", "Regra salva com sucesso.");
      } catch (err) {
        setInlineNote("rulesNote", `Erro ao salvar regra: ${err.message}`, true);
      }
    };

    el("copyJsonBtn").onclick = async () => {
      const json = JSON.stringify({
        suggestion: state.lastIngest?.suggestion,
        route: collectRoute(),
        layout: collectLayout(),
        standardize: collectStandardize(),
      }, null, 2);
      await navigator.clipboard.writeText(json);
      el("microNote").textContent = "Copiado para a área de transferência.";
    };
  }

  function boot(){
    setStatus("Carregando regras…");
    google.script.run
      .withSuccessHandler(async (res) => {
        state.boot = res;
        setStatus("Online");
        setDestinationOptions(res.destinations || []);
        setSheetOptions(res.sheets || []);
        renderRulesTable(res.rules || []);
        if (res.prefs?.lastRoute?.targetSpreadsheetId) {
          el("spreadsheetId").value = res.prefs.lastRoute.targetSpreadsheetId;
          await loadSheetsForSelectedSpreadsheet();
        }
        applyPrefs(res.prefs);
        applyTargetPrefsForCurrentSelection();
        setLayoutInputsEnabled(false);
        el("destinationNote").textContent = "Cadastro de planilhas carregado.";
      })
      .withFailureHandler((err) => {
        setStatus("Falha no boot");
        el("microNote").textContent = err?.message || err;
      })
      .api_getBoot();
  }

  wireDropzone();
  wireActions();
  updateStructureVisibility();
  setFlowStep(1);
  boot();
</script>
